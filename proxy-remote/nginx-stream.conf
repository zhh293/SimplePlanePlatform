# Nginx TCP (Layer 4) reverse proxy for proxy-remote Netty server
# 安装位置: /etc/nginx/nginx.conf 或引入到主配置

# stream 模块用于 TCP 四层代理（非 HTTP）
stream {
    # 日志格式
    log_format proxy '$remote_addr [$time_local] '
                     '$protocol $status $bytes_sent $bytes_received '
                     '$session_time "$upstream_addr"';

    access_log /var/log/nginx/proxy-remote-access.log proxy;
    error_log  /var/log/nginx/proxy-remote-error.log;

    upstream netty_backend {
        server 127.0.0.1:19090;
    }

    server {
        listen 9090;          # 对外暴露端口（与原来保持一致，客户端无需改动）
        proxy_pass netty_backend;
        proxy_connect_timeout 5s;
        proxy_timeout 600s;   # 长连接保持 10 分钟
        proxy_protocol off;
    }
}
